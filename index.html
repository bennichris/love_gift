<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Anu ❤️</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd1dc, #ff9a9e);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #2b2b2b;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    .floating-heart {
      position: absolute;
      bottom: -40px;
      font-size: 24px;
      opacity: 0.75;
      animation: floatUp 6s linear infinite;
      pointer-events: none;
    }

    .floating-heart:nth-child(1) { left: 8%; animation-delay: 0s; font-size: 22px; }
    .floating-heart:nth-child(2) { left: 22%; animation-delay: 1.2s; font-size: 28px; }
    .floating-heart:nth-child(3) { left: 42%; animation-delay: 2.4s; font-size: 20px; }
    .floating-heart:nth-child(4) { left: 63%; animation-delay: 0.8s; font-size: 30px; }
    .floating-heart:nth-child(5) { left: 82%; animation-delay: 1.8s; font-size: 24px; }
    .floating-heart:nth-child(6) { left: 50%; animation-delay: 3.2s; font-size: 34px; }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 0; }
      15% { opacity: 0.8; }
      100% { transform: translateY(-110vh) scale(1.35) rotate(25deg); opacity: 0; }
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      width: 100%;
      max-width: 390px;
      padding: 36px 24px;
      border-radius: 30px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
      animation: popIn 0.6s ease;
      position: relative;
      z-index: 2;
      backdrop-filter: blur(8px);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    .heart-gif {
      font-size: 56px;
      margin-bottom: 10px;
      display: inline-block;
      animation: heartbeat 1.1s infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.18); }
      45% { transform: scale(0.96); }
      65% { transform: scale(1.22); }
    }

    h2 {
      font-size: 25px;
      margin: 12px 0 22px;
      line-height: 1.3;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 14px 26px;
      border-radius: 999px;
      font-size: 17px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:active { transform: scale(0.95); }

    .yes {
      background: #ff4f81;
      color: white;
      box-shadow: 0 8px 18px rgba(255, 79, 129, 0.35);
    }

    .no {
      background: #f1f1f1;
      color: #333;
    }

    #cry {
      display: none;
      color: #ff4f81;
      font-size: 18px;
      margin-top: 18px;
      line-height: 1.4;
    }

    #message {
      display: none;
      font-size: 21px;
      line-height: 1.55;
      margin-top: 10px;
      animation: fadeIn 0.7s ease;
    }

    .final-hearts {
      font-size: 34px;
      margin: 14px 0;
      animation: heartbeat 1.1s infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .small {
      font-size: 15px;
      color: #666;
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <span class="floating-heart">❤️</span>
  <span class="floating-heart">💖</span>
  <span class="floating-heart">💕</span>
  <span class="floating-heart">💗</span>
  <span class="floating-heart">❤️</span>
  <span class="floating-heart">💘</span>

  <div class="card">
    <div class="heart-gif" id="mainHeart">💌</div>

    <h2 id="question">Anu, do you really love me? ❤️</h2>

    <div class="buttons" id="buttons">
      <button class="yes" onclick="yesClick()">Yes ❤️</button>
      <button class="no" onclick="noClick()">No</button>
    </div>

    <p id="cry">Why, Anu? 😢<br>Please press Yes ❤️</p>

    <div id="message">
      <div class="final-hearts">❤️ 💖 ❤️</div>
      Anu, I love you ❤️<br><br>
      You are my partner, my happiness, and my favorite person.<br><br>
      I am lucky to have you in my life 💖
      <div class="small">Forever yours 🥹</div>
    </div>
  </div>

  <script>
    let step = 1;

    function yesClick() {
      const question = document.getElementById("question");
      const buttons = document.getElementById("buttons");
      const cry = document.getElementById("cry");
      const message = document.getElementById("message");
      const mainHeart = document.getElementById("mainHeart");

      if (step === 1) {
        question.innerText = "Really, Anu? Once more 🥹❤️";
        mainHeart.innerText = "🥹";
        cry.style.display = "none";
        step = 2;
      } else {
        question.style.display = "none";
        buttons.style.display = "none";
        cry.style.display = "none";
        mainHeart.innerText = "❤️";
        message.style.display = "block";
      }
    }

    function noClick() {
      const question = document.getElementById("question");
      const cry = document.getElementById("cry");
      const mainHeart = document.getElementById("mainHeart");

      question.innerText = "Please say Yes, Anu 🥺";
      mainHeart.innerText = "😭";
      cry.style.display = "block";
    }
  </script>
</body>
</html>
